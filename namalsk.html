            background-color: #18181d;

    <script>
        L.Control.MousePosition = L.Control.extend({
            options: {
                position: 'bottomleft',
                separator: ' : ',
                emptyString: 'Unavailable',
                lngFirst: false,
                numDigits: 5,
                lngFormatter: undefined,
                latFormatter: undefined,
                prefix: ""
            },

            onAdd: function (map) {
                this._container = L.DomUtil.create('div', 'leaflet-control-mouseposition');
                L.DomEvent.disableClickPropagation(this._container);
                map.on('mousemove', this._onMouseMove, this);
                this._container.innerHTML = this.options.emptyString;
                return this._container;
            },

            onRemove: function (map) {
                map.off('mousemove', this._onMouseMove)
            },

            _onMouseMove: function (e) {
                var lng = this.options.lngFormatter ? this.options.lngFormatter(e.latlng.lng) : L.Util.formatNum(e.latlng.lng, this.options.numDigits);
                var lat = this.options.latFormatter ? this.options.latFormatter(e.latlng.lat) : L.Util.formatNum(e.latlng.lat, this.options.numDigits);
                var value = this.options.lngFirst ? lng + this.options.separator + lat : lat + this.options.separator + lng;
                var prefixAndValue = this.options.prefix + ' ' + value;
                this._container.innerHTML = prefixAndValue;
            }

        });

        L.Map.mergeOptions({
            positionControl: false
        });

        L.Map.addInitHook(function () {
            if (this.options.positionControl) {
                this.positionControl = new L.Control.MousePosition();
                this.addControl(this.positionControl);
            }
        });

        L.control.mousePosition = function (options) {
            return new L.Control.MousePosition(options);
        };
    </script>

    <script>
        let map_image_url = 'https://cdn.cftools.de/static_assets/game_labs/maps/game_dayz_namalsk.png';
        let factor_game_to_map = 0.05859375;
        let factor_map_to_game = 17.0666666667;

        function game_to_map(x) { return roundNumber(x * factor_game_to_map, 2); }
        function map_to_game(x) { return roundNumber(x * factor_map_to_game, 2); }

        const playerPositionRegex = /^Player \"(.*)\" (\(DEAD\) )?\(id=([^ ]+) pos=<([0-9.]+), ([0-9.]+), ([0-9.]+)>\)$/;
        let playerMarkers = [];
        let allPlayers = {};
        let positionEvents = [];
        let map_div = null;

        function selectColor(number) {
            const hue = (number * 137.508) % 360; // use golden angle approximation
            return `hsl(${hue},100%,75%)`;
        }

        function sortList(ul) {
            if (typeof ul == 'string')
                ul = document.getElementById(ul);
            var lis = ul.getElementsByTagName('li');
            var values = [];

            for (var i = 0, l = lis.length; i < l; i++)
                values.push(lis[i].innerHTML);
            values.sort(function (a, b) {
                return a.toLowerCase().localeCompare(b.toLowerCase());
            });
            for (var i = 0, l = lis.length; i < l; i++)
                lis[i].innerHTML = values[i];
        }

        function displayAllPlayer() {
            for (const bohemiaId in allPlayers) {
                let name = allPlayers[bohemiaId].name;
                let color = allPlayers[bohemiaId].color;
                addPlayerToSideBar(bohemiaId, name, color);
            }
            sortList('player-list');
        }

        function addPlayerToSideBar(bohemiaId, name, color) {
            $(`<li class="list-group-item" id="player-${bohemiaId}">`)
                .text(name)
                .css('color', color)
                .appendTo('#player-list');
            // <span class="badge badge-primary badge-pill">14</span>
        }

        function addPlayerToMap(bohemiaId, name, color, position) {
            let player_marker = L.circleMarker(
                [game_to_map(position[1]), game_to_map(position[0])], {
                radius: 3.5,
                fillColor: color,
                color: '#000',
                weight: 1.2,
                opacity: 1,
                fillOpacity: 1.0,
                riseOnHover: true,
                pane: 'player_markers',
                className: 'player-marker'
            });
            player_marker.addTo(map_div);
            playerMarkers.push(player_marker);
        }

        function resetPlayerOnMap() {
            playerMarkers.forEach(function(element) {
                element.remove();
            });
            playerMarkers = [];
        }

        function displayPositions(index) {
            let players = positionEvents[index].players;

            console.log(`Displaying index ${index}`);

            resetPlayerOnMap();
            for (const bohemiaId in players) {
                let position = players[bohemiaId];
                let name = allPlayers[bohemiaId].name;
                let color = allPlayers[bohemiaId].color;
                addPlayerToMap(bohemiaId, name, color, position);
            }
        }

        function displayFileData() {
            displayAllPlayer();
            $('#file-load').hide();
            $('#player-container').show();
            $("#time-slider").attr('max', positionEvents.length);
            displayPositions(0);
            $('#time-slider').on('input change', function (e) {
                displayPositions(e.target.value - 1);
            });
        }

        function processFileData(data) {
            // reset
            allPlayers = {};
            positionEvents = [];

            let logStartDateTime = null;
            let parsingPlayerPositions = false;

            data.split(/\r?\n/).forEach((line) => {
                line = line.trim();
                if (line.length == 0 || line.startsWith('*****')) {
                    return;
                }
                if (line.startsWith('AdminLog started')) {
                    const dateStr = line.substring(20, 30) + 'T' + line.substring(34, 42) + '.000-05:00';
                    logStartDateTime = Date.parse(dateStr);
                    return;
                }

                let text = line.substring(11);

                if (!parsingPlayerPositions) {
                    if (text.startsWith('##### PlayerList')) {
                        parsingPlayerPositions = true;
                        positionEvents.push({
                            dateTime: null, // FIXME
                            players: {},
                        });
                        return;
                    }
                } else {
                    if (text == '#####') {
                        parsingPlayerPositions = false;
                        return;
                    }
                    if (!text.startsWith('Player "')) {
                        return;
                    }
                    // TODO: handle time

                    const m = playerPositionRegex.exec(text);
                    if (m !== null) {
                        const playerName = m[1];
                        const bohemiaId = m[3];
                        const position = [m[4], m[5], m[6]];
                        positionEvents[positionEvents.length - 1].players[bohemiaId] = position;
                        if (!(bohemiaId in allPlayers)) {
                            allPlayers[bohemiaId] = {
                                name: playerName,
                                color: selectColor(Object.keys(allPlayers).length),
                            };
                        }
                    }
                }
            });

            displayFileData();
        }

        function handleFile(input) {
            let reader = new FileReader();
            reader.readAsText(input.files[0]);
            reader.onloadend = function () {
                processFileData(reader.result);
            };
        }

        function roundNumber(num, scale) {
            if (!("" + num).includes("e")) {
                return +(Math.round(num + "e+" + scale) + "e-" + scale);
            } else {
                var arr = ("" + num).split("e");
                var sig = ""
                if (+arr[1] + scale > 0) {
                    sig = "+";
                }
                return +(Math.round(+arr[0] + "e" + sig + (+arr[1] + scale)) + "e-" + scale);
            }
        }

        $(document).ready(function () {
            var markers = new L.LayerGroup();
            map_div = L.map('map-div', {
                crs: L.CRS.Simple,
                maxZoom: 6,
                minZoom: 0,
                center: [750 / 2, 750 / 2],
                layers: [markers],
                attributionControl: false,
            });
            var bounds = [[0, 0], [750, 750]];
            var image = L.imageOverlay(map_image_url, bounds).addTo(map_div);

            var fitBounds = [[300, 100], [650, 600]];
            map_div.fitBounds(fitBounds);
            map_div.createPane('player_markers');
            map_div.getPane('player_markers').style.zIndex = 550;

            var map_lng = 0;
            var map_lat = 0;

            L.control.mousePosition({
                numDigits: 2,
                emptyString: 'Place cursor in map to display coordinates',
                lngFormatter: function (lng) {
                    return map_to_game(lng);
                },
                latFormatter: function (lat) {
                    return map_to_game(lat);
                }
            }).addTo(map_div);
        });
    </script>
